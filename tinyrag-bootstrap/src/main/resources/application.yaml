server:
  port: 8080

spring:
  application:
    name: tinyrag

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    openai:
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
      api-key: ${SILICONFLOW_API_KEY:your-api-key}
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3.2
          temperature: 0.1
      embedding:
        options:
          model: Qwen/Qwen3-Embedding-8B

    vectorstore:
      milvus:
        initialize-schema: true
        collection-name: ${MILVUS_COLLECTION:tinyrag_kb}
        database-name: ${MILVUS_DATABASE:default}
        id-field-name: id
        content-field-name: content
        embedding-field-name: embedding
        metadata-field-name: metadata
        embedding-dimension: ${EMBEDDING_DIMENSION:4096}
        metric-type: cosine
        index-type: ivf-flat
        index-parameters: '{"nlist":1024}'
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
          username: ${MILVUS_USERNAME:root}
          password: ${MILVUS_PASSWORD:milvus}

    mcp:
      client:
        type: SYNC
        streamable-http:
          connections:
            tinyrag-server:
              url: http://127.0.0.1:8081
              endpoint: /mcp

app:
  rag:
    rewrite-model: ${RAG_REWRITE_MODEL:}
    answer-model: ${RAG_ANSWER_MODEL:}
    rerank-model: Qwen/Qwen3-Reranker-8B
    rerank-endpoint: https://api.siliconflow.cn/v1/rerank
    retrieve-top-k: 8
    rerank-top-n: 4
    rerank-max-document-chars: 12000
    chunk-size: 800
    min-chunk-size-chars: 350
    min-chunk-length-to-embed: 10
    max-num-chunks: 1000
